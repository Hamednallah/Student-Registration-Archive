<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Port Sudan Ahlia College - Student Registration System</title>
  
  <!-- Set base URL for all relative URLs - this needs to end with a slash -->
  <base href="/">
  
  <link rel="icon type="image/png" href="/assets/logo.png">
  <link rel="shortcut icon" href="/assets/logo.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
  <!-- CSS - Modular system -->
  <link rel="stylesheet" href="/src/styles/main.css">
  
  <!-- 
    For legacy support, uncomment the line below:
    <link rel="stylesheet" href="/src/styles/styles.css">
  -->
  
  <style>
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Tajawal', sans-serif;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #5A2D8A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <!-- PWA Support -->
  <link rel="manifest" href="/src/manifest.json">
  <meta name="theme-color" content="#5A2D8A">
  <link rel="apple-touch-icon" href="/assets/logo.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PSAC Registration">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Application Scripts -->
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <div id="app-loading">
    <div class="loading-spinner"></div>
    <p>Loading application...</p>
  </div>
</body>
</html>
